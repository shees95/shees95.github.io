<svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64B5F6"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF9A9A"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A5D6A7"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000044"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="#0D1117"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#E0E0E0">Lyra Weapon Acquisition Flow</text>
  <line x1="80" y1="50" x2="1020" y2="50" stroke="#30363D" stroke-width="1"/>

  <!-- ── LAYER LABELS ── -->
  <text x="20" y="120" font-size="11" fill="#6E7681" transform="rotate(-90,20,120)">INVENTORY</text>
  <text x="20" y="350" font-size="11" fill="#6E7681" transform="rotate(-90,20,350)">GAS / ABILITY</text>
  <text x="20" y="580" font-size="11" fill="#6E7681" transform="rotate(-90,20,580)">EQUIPMENT</text>
  <text x="20" y="740" font-size="11" fill="#6E7681" transform="rotate(-90,20,740)">INPUT</text>

  <!-- ══ ROW 1: INVENTORY ══ -->
  <!-- ULyraInventoryManagerComponent -->
  <rect x="60" y="65" width="220" height="64" rx="8" fill="#1C2128" stroke="#388E3C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#81C784">ULyraInventoryManagerComponent</text>
  <text x="170" y="103" text-anchor="middle" font-size="10" fill="#6E7681">ActorComponent</text>
  <text x="170" y="117" text-anchor="middle" font-size="10" fill="#4A90D9">AddItemDefinition()</text>

  <!-- ULyraInventoryItemDefinition -->
  <rect x="340" y="65" width="220" height="64" rx="8" fill="#1C2128" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#64B5F6">ULyraInventoryItemDefinition</text>
  <text x="450" y="103" text-anchor="middle" font-size="10" fill="#6E7681">PrimaryDataAsset</text>
  <text x="450" y="117" text-anchor="middle" font-size="10" fill="#6E7681">ItemFragments[]</text>

  <!-- ULyraInventoryItemInstance -->
  <rect x="620" y="65" width="220" height="64" rx="8" fill="#1C2128" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#64B5F6">ULyraInventoryItemInstance</text>
  <text x="730" y="103" text-anchor="middle" font-size="10" fill="#6E7681">UObject (Replicated)</text>
  <text x="730" y="117" text-anchor="middle" font-size="10" fill="#6E7681">StatTags / Fragments</text>

  <!-- UInventoryFragment_EquippableItem -->
  <rect x="900" y="65" width="170" height="64" rx="8" fill="#1C2128" stroke="#6A1B9A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="985" y="84" text-anchor="middle" font-size="10" font-weight="bold" fill="#CE93D8">UInventoryFragment</text>
  <text x="985" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#CE93D8">_EquippableItem</text>
  <text x="985" y="114" text-anchor="middle" font-size="10" fill="#6E7681">EquipmentDefinition</text>

  <!-- Arrows row 1 -->
  <line x1="280" y1="97" x2="338" y2="97" stroke="#64B5F6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="309" y="91" text-anchor="middle" font-size="9" fill="#6E7681">reads</text>

  <line x1="560" y1="97" x2="618" y2="97" stroke="#64B5F6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="589" y="91" text-anchor="middle" font-size="9" fill="#6E7681">creates</text>

  <line x1="840" y1="97" x2="898" y2="97" stroke="#CE93D8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="869" y="91" text-anchor="middle" font-size="9" fill="#6E7681">fragment</text>

  <!-- ══ ROW 2: GAS / ABILITY ══ -->
  <!-- ULyraAbilitySystemComponent -->
  <rect x="60" y="195" width="220" height="64" rx="8" fill="#1C2128" stroke="#E65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="217" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFAB91">ULyraAbilitySystemComponent</text>
  <text x="170" y="233" text-anchor="middle" font-size="10" fill="#6E7681">UAbilitySystemComponent</text>
  <text x="170" y="247" text-anchor="middle" font-size="10" fill="#4A90D9">GiveAbility() / SetAbility()</text>

  <!-- ULyraAbilitySet -->
  <rect x="340" y="195" width="220" height="64" rx="8" fill="#1C2128" stroke="#E65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="217" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFAB91">ULyraAbilitySet</text>
  <text x="450" y="233" text-anchor="middle" font-size="10" fill="#6E7681">PrimaryDataAsset</text>
  <text x="450" y="247" text-anchor="middle" font-size="10" fill="#6E7681">GrantedGameplayAbilities[]</text>

  <!-- ULyraGameplayAbility_RangedWeapon -->
  <rect x="620" y="195" width="220" height="64" rx="8" fill="#1C2128" stroke="#F57F17" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="214" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFD54F">ULyraGameplayAbility</text>
  <text x="730" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFD54F">_RangedWeapon</text>
  <text x="730" y="245" text-anchor="middle" font-size="10" fill="#6E7681">Fire / ADS / Reload</text>

  <!-- FLyraAbilitySet_Handle -->
  <rect x="900" y="195" width="170" height="64" rx="8" fill="#1C2128" stroke="#37474F" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="985" y="217" text-anchor="middle" font-size="10" font-weight="bold" fill="#90A4AE">FLyraAbilitySet_Handle</text>
  <text x="985" y="233" text-anchor="middle" font-size="10" fill="#6E7681">AbilitySpecHandles[]</text>
  <text x="985" y="247" text-anchor="middle" font-size="10" fill="#4A90D9">TakeFromAbilitySystem()</text>

  <!-- Arrows row 2 -->
  <line x1="280" y1="227" x2="338" y2="227" stroke="#FFAB91" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="227" x2="618" y2="227" stroke="#FFAB91" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="840" y1="227" x2="898" y2="227" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="869" y="221" text-anchor="middle" font-size="9" fill="#6E7681">grants→handle</text>

  <!-- ══ VERTICAL: Inventory → GAS ══ -->
  <line x1="170" y1="129" x2="170" y2="193" stroke="#A5D6A7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <text x="185" y="165" font-size="9" fill="#A5D6A7">GrantAbilities</text>

  <!-- ══ ROW 3: EQUIPMENT ══ -->
  <!-- ULyraEquipmentManagerComponent -->
  <rect x="60" y="325" width="220" height="64" rx="8" fill="#1C2128" stroke="#4527A0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="347" text-anchor="middle" font-size="11" font-weight="bold" fill="#B39DDB">ULyraEquipmentManagerComponent</text>
  <text x="170" y="363" text-anchor="middle" font-size="10" fill="#6E7681">ActorComponent</text>
  <text x="170" y="377" text-anchor="middle" font-size="10" fill="#4A90D9">EquipItem() / UnequipItem()</text>

  <!-- ULyraEquipmentDefinition -->
  <rect x="340" y="325" width="220" height="64" rx="8" fill="#1C2128" stroke="#4527A0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="347" text-anchor="middle" font-size="11" font-weight="bold" fill="#B39DDB">ULyraEquipmentDefinition</text>
  <text x="450" y="363" text-anchor="middle" font-size="10" fill="#6E7681">UObject</text>
  <text x="450" y="377" text-anchor="middle" font-size="10" fill="#6E7681">AbilitySetsToGrant[] / Actors[]</text>

  <!-- ULyraEquipmentInstance -->
  <rect x="620" y="325" width="220" height="64" rx="8" fill="#1C2128" stroke="#4527A0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="347" text-anchor="middle" font-size="11" font-weight="bold" fill="#B39DDB">ULyraEquipmentInstance</text>
  <text x="730" y="363" text-anchor="middle" font-size="10" fill="#6E7681">UObject (Replicated)</text>
  <text x="730" y="377" text-anchor="middle" font-size="10" fill="#4A90D9">OnEquipped() / OnUnequipped()</text>

  <!-- ULyraWeaponInstance -->
  <rect x="900" y="325" width="170" height="64" rx="8" fill="#1C2128" stroke="#B71C1C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="985" y="347" text-anchor="middle" font-size="10" font-weight="bold" fill="#EF9A9A">ULyraWeaponInstance</text>
  <text x="985" y="363" text-anchor="middle" font-size="10" fill="#6E7681">: ULyraEquipmentInstance</text>
  <text x="985" y="377" text-anchor="middle" font-size="10" fill="#6E7681">HeatTracker / SpreadAngle</text>

  <!-- Arrows row 3 -->
  <line x1="280" y1="357" x2="338" y2="357" stroke="#B39DDB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="357" x2="618" y2="357" stroke="#B39DDB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="840" y1="357" x2="898" y2="357" stroke="#EF9A9A" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="869" y="349" text-anchor="middle" font-size="9" fill="#6E7681">subclass</text>

  <!-- ══ VERTICAL: Inventory → Equipment ══ -->
  <line x1="985" y1="129" x2="985" y2="193" stroke="#CE93D8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="1005" y="165" font-size="9" fill="#CE93D8">ref</text>
  <line x1="985" y1="259" x2="985" y2="323" stroke="#CE93D8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="1005" y="295" font-size="9" fill="#CE93D8">spawn</text>

  <line x1="170" y1="259" x2="170" y2="323" stroke="#B39DDB" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="185" y="295" font-size="9" fill="#B39DDB">EquipItem()</text>

  <!-- ══ ROW 4: INPUT ══ -->
  <!-- ULyraInputConfig -->
  <rect x="60" y="455" width="220" height="64" rx="8" fill="#1C2128" stroke="#006064" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="477" text-anchor="middle" font-size="11" font-weight="bold" fill="#80DEEA">ULyraInputConfig</text>
  <text x="170" y="493" text-anchor="middle" font-size="10" fill="#6E7681">PrimaryDataAsset</text>
  <text x="170" y="507" text-anchor="middle" font-size="10" fill="#6E7681">NativeActions / AbilityActions</text>

  <!-- ULyraHeroComponent -->
  <rect x="340" y="455" width="220" height="64" rx="8" fill="#1C2128" stroke="#006064" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="477" text-anchor="middle" font-size="11" font-weight="bold" fill="#80DEEA">ULyraHeroComponent</text>
  <text x="450" y="493" text-anchor="middle" font-size="10" fill="#6E7681">PawnComponent</text>
  <text x="450" y="507" text-anchor="middle" font-size="10" fill="#4A90D9">InitializePlayerInput()</text>

  <!-- UEnhancedInputComponent -->
  <rect x="620" y="455" width="220" height="64" rx="8" fill="#1C2128" stroke="#006064" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="477" text-anchor="middle" font-size="11" font-weight="bold" fill="#80DEEA">ULyraInputComponent</text>
  <text x="730" y="493" text-anchor="middle" font-size="10" fill="#6E7681">: UEnhancedInputComponent</text>
  <text x="730" y="507" text-anchor="middle" font-size="10" fill="#4A90D9">BindAbilityActions()</text>

  <!-- GameplayTag → ASC -->
  <rect x="900" y="455" width="170" height="64" rx="8" fill="#1C2128" stroke="#1B5E20" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="985" y="477" text-anchor="middle" font-size="10" font-weight="bold" fill="#A5D6A7">ASC</text>
  <text x="985" y="493" text-anchor="middle" font-size="10" fill="#6E7681">TryActivateAbilitiesByTag()</text>
  <text x="985" y="507" text-anchor="middle" font-size="10" fill="#6E7681">InputTag → AbilityTag</text>

  <!-- Arrows row 4 -->
  <line x1="280" y1="487" x2="338" y2="487" stroke="#80DEEA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="487" x2="618" y2="487" stroke="#80DEEA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="840" y1="487" x2="898" y2="487" stroke="#A5D6A7" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ══ VERTICAL: Equipment → Input binding (AbilitySet grants abilities with InputTag) ══ -->
  <line x1="450" y1="389" x2="450" y2="453" stroke="#80DEEA" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="465" y="425" font-size="9" fill="#80DEEA">BindInput</text>

  <!-- ══ ROW 5: SEQUENCE SUMMARY ══ -->
  <rect x="60" y="570" width="1010" height="200" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="565" y="595" text-anchor="middle" font-size="13" font-weight="bold" fill="#E0E0E0">Acquisition Sequence (Server-Side)</text>

  <!-- Step boxes -->
  <rect x="80" y="610" width="130" height="50" rx="6" fill="#1C2128" stroke="#388E3C" stroke-width="1.2"/>
  <text x="145" y="630" text-anchor="middle" font-size="10" font-weight="bold" fill="#81C784">① Pickup</text>
  <text x="145" y="645" text-anchor="middle" font-size="9" fill="#6E7681">InventoryManager</text>
  <text x="145" y="658" text-anchor="middle" font-size="9" fill="#6E7681">AddItemDef(WeaponDef)</text>

  <line x1="210" y1="635" x2="240" y2="635" stroke="#64B5F6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="240" y="610" width="150" height="50" rx="6" fill="#1C2128" stroke="#1565C0" stroke-width="1.2"/>
  <text x="315" y="630" text-anchor="middle" font-size="10" font-weight="bold" fill="#64B5F6">② ItemInstance 생성</text>
  <text x="315" y="645" text-anchor="middle" font-size="9" fill="#6E7681">Def→Fragments 복사</text>
  <text x="315" y="658" text-anchor="middle" font-size="9" fill="#6E7681">EquippableFragment 포함</text>

  <line x1="390" y1="635" x2="420" y2="635" stroke="#64B5F6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="420" y="610" width="150" height="50" rx="6" fill="#1C2128" stroke="#4527A0" stroke-width="1.2"/>
  <text x="495" y="630" text-anchor="middle" font-size="10" font-weight="bold" fill="#B39DDB">③ Equip</text>
  <text x="495" y="645" text-anchor="middle" font-size="9" fill="#6E7681">EquipmentManager</text>
  <text x="495" y="658" text-anchor="middle" font-size="9" fill="#6E7681">EquipItem(EquipDef)</text>

  <line x1="570" y1="635" x2="600" y2="635" stroke="#64B5F6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="600" y="610" width="150" height="50" rx="6" fill="#1C2128" stroke="#E65100" stroke-width="1.2"/>
  <text x="675" y="630" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFAB91">④ AbilitySet Grant</text>
  <text x="675" y="645" text-anchor="middle" font-size="9" fill="#6E7681">AbilitySet→ASC</text>
  <text x="675" y="658" text-anchor="middle" font-size="9" fill="#6E7681">GiveAbility(AbilitySpec)</text>

  <line x1="750" y1="635" x2="780" y2="635" stroke="#64B5F6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="780" y="610" width="150" height="50" rx="6" fill="#1C2128" stroke="#006064" stroke-width="1.2"/>
  <text x="855" y="630" text-anchor="middle" font-size="10" font-weight="bold" fill="#80DEEA">⑤ Input Binding</text>
  <text x="855" y="645" text-anchor="middle" font-size="9" fill="#6E7681">InputTag↔AbilityTag</text>
  <text x="855" y="658" text-anchor="middle" font-size="9" fill="#6E7681">EnhancedInput 연결</text>

  <line x1="930" y1="635" x2="960" y2="635" stroke="#64B5F6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="960" y="610" width="95" height="50" rx="6" fill="#1C2128" stroke="#1B5E20" stroke-width="1.2"/>
  <text x="1007" y="630" text-anchor="middle" font-size="10" font-weight="bold" fill="#A5D6A7">⑥ Ready</text>
  <text x="1007" y="645" text-anchor="middle" font-size="9" fill="#6E7681">발사 가능</text>
  <text x="1007" y="658" text-anchor="middle" font-size="9" fill="#6E7681">상태</text>

  <!-- Unequip note -->
  <text x="565" y="690" text-anchor="middle" font-size="10" fill="#6E7681">Unequip: EquipmentInstance→OnUnequipped() → AbilitySet.TakeFromAbilitySystem(Handle) → 어빌리티 제거</text>
  <text x="565" y="708" text-anchor="middle" font-size="10" fill="#6E7681">Replicated: EquipmentInstance / InventoryItemInstance는 서버에서 생성, COND_OwnerOnly or All로 클라이언트에 복제</text>

  <!-- Legend -->
  <rect x="80" y="720" width="12" height="12" rx="2" fill="none" stroke="#388E3C" stroke-width="1.5"/>
  <text x="98" y="731" font-size="10" fill="#81C784">Inventory</text>
  <rect x="180" y="720" width="12" height="12" rx="2" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <text x="198" y="731" font-size="10" fill="#64B5F6">DataAsset/Instance</text>
  <rect x="310" y="720" width="12" height="12" rx="2" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <text x="328" y="731" font-size="10" fill="#FFAB91">GAS / AbilitySet</text>
  <rect x="430" y="720" width="12" height="12" rx="2" fill="none" stroke="#4527A0" stroke-width="1.5"/>
  <text x="448" y="731" font-size="10" fill="#B39DDB">Equipment</text>
  <rect x="520" y="720" width="12" height="12" rx="2" fill="none" stroke="#006064" stroke-width="1.5"/>
  <text x="538" y="731" font-size="10" fill="#80DEEA">Input</text>
  <line x1="580" y1="726" x2="610" y2="726" stroke="#64B5F6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="618" y="731" font-size="10" fill="#6E7681">data ref</text>
  <line x1="670" y1="726" x2="700" y2="726" stroke="#64B5F6" stroke-width="1.5"/>
  <text x="708" y="731" font-size="10" fill="#6E7681">call / create</text>
</svg>
