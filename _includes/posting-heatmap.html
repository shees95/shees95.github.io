<style>
  #posting-heatmap { margin-top: 3rem; }
  #posting-heatmap h2.panel-heading { margin-bottom: 0.75rem; }
  .heatmap-grid {
    display: flex;
    gap: 3px;
  }
  .heatmap-col { display: flex; flex-direction: column; gap: 3px; }
  .heatmap-cell {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    background: var(--border-color, #2a2a2a);
    cursor: default;
  }
  .heatmap-cell[data-count="1"] { background: #1e4a6e; }
  .heatmap-cell[data-count="2"] { background: #1e6ea8; }
  .heatmap-cell[data-count="3"] { background: #2196d3; }
  .heatmap-cell[data-count="4"] { background: #5ab4ec; }
  .heatmap-legend {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 0.5rem;
    font-size: 0.7rem;
    color: var(--text-muted-color);
  }
  .heatmap-legend .heatmap-cell { flex-shrink: 0; }
</style>

<section id="posting-heatmap">
  <h2 class="panel-heading">Posting Activity</h2>
  <div class="heatmap-grid" id="heatmap-grid"></div>
  <div class="heatmap-legend">
    <span>Less</span>
    <span class="heatmap-cell"></span>
    <span class="heatmap-cell" data-count="1"></span>
    <span class="heatmap-cell" data-count="2"></span>
    <span class="heatmap-cell" data-count="3"></span>
    <span class="heatmap-cell" data-count="4"></span>
    <span>More</span>
  </div>
</section>

<script>
(function() {
  {%- capture post_dates -%}{%- for post in site.posts -%}{{ post.date | date: '%Y-%m-%d' }},{%- endfor -%}{%- endcapture -%}
  const raw = "{{ post_dates | strip }}";
  const postDates = raw.split(',').filter(Boolean);
  const countMap = {};
  postDates.forEach(d => { countMap[d] = (countMap[d] || 0) + 1; });

  const grid = document.getElementById('heatmap-grid');
  if (!grid) return;

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const startDate = new Date(today);
  startDate.setDate(today.getDate() - 16 * 7 + 1);

  for (let w = 0; w < 16; w++) {
    const col = document.createElement('div');
    col.className = 'heatmap-col';
    for (let d = 0; d < 7; d++) {
      const date = new Date(startDate);
      date.setDate(startDate.getDate() + w * 7 + d);
      const key = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
      const count = countMap[key] || 0;
      const cell = document.createElement('div');
      cell.className = 'heatmap-cell';
      if (count > 0) cell.setAttribute('data-count', Math.min(count, 4));
      cell.title = key + (count ? ` (${count}개 포스트)` : '');
      col.appendChild(cell);
    }
    grid.appendChild(col);
  }
})();
</script>
